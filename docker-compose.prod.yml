# Produção — VPS única com Caddy (SSL automático via Let's Encrypt).
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# Config: copie .env.prod.example para .env e preencha.
services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: delivery
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://delivery:${POSTGRES_PASSWORD}@postgres:5432/delivery?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: https://${WEB_DOMAIN}
      API_PUBLIC_URL: https://${API_DOMAIN}
      # Fuso do negócio: relatórios por dia e horários de funcionamento
      # dependem do horário local, não de UTC
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      # imagens enviadas (até migrar para R2/S3)
      - uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}/api
        NEXT_PUBLIC_WS_URL: https://${API_DOMAIN}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN:?defina WEB_DOMAIN no .env}
      API_DOMAIN: ${API_DOMAIN:?defina API_DOMAIN no .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  redisdata:
  uploads:
  caddydata:
  caddyconfig:
